<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Rezervimet</title>
    <link rel="stylesheet" href="../../styles/css/dashboard/adminrezervimet.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
        integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">

<script src="../../data/db.js"></script>
</head>

<body>
    <div class="dashboard">
        <div class="container-fluid">
            <div class="row d-flex felx-row justify-content-between">
                <div class="col-md-3 bg-secondary sidebar">
                    <div class="d-flex gap-3 text-light pt-4">
                        <i class="bi bi-car-front-fill fs-3 text-primary"></i>
                        <h2 class="fw-bold">Rent a Car</h2>
                    </div>
                    <hr class="text-light">
                    <ul class="list-unstyled p-3">
                        <li class="mb-4 fs-4">
                            <a href="./admindashboard.html" class="text-decoration-none text-light"><i
                                    class="bi bi-house-door-fill"></i>
                                Dashboard</a>
                        </li>
                        <li class="mb-4 fs-4">
                            <a href="./adminautomjetet.html" class="text-decoration-none text-light"><i
                                    class="bi bi-car-front-fill"></i>
                                Automjetet</a>
                        </li>
                        <li class="mb-4 fs-4">
                            <a href="./adminklientet.html" class="text-decoration-none text-light"><i
                                    class="bi bi-people-fill"></i>
                                Klientet</a>
                        </li>
                        <li class="mb-4 fs-4">
                            <a href="./adminrezervimet.html" class="text-decoration-none text-primary"><i
                                    class="bi bi-calendar-check"></i>
                                Rezervimet</a>
                        </li>
                        <li class="mb-4 fs-4">
                            <a href="./adminmesazhet.html" class="text-decoration-none text-light"><i
                                    class="bi bi-envelope-arrow-down-fill"></i>
                                Mesazhet</a>
                        </li>
                        <li class="mb-4 fs-4">
                            <a href="#" class="text-decoration-none text-light"><i class="bi bi-cash-stack"></i>
                                Pagesat</a>
                        </li>
                        <li>
                            <span id="adminUser"></span>
                            <span id="logOut"></span>
                        </li>
                        <li class="mb-4 fs-4">
                            <a href="#" class="text-decoration-none text-light"><i class="bi bi-gear-fill"></i>
                                Settings</a>
                        </li>
                    </ul>
                </div>
                <div class="col-md-9">
                    <section class="admin-dashboard py-5">
                        <div class="container">
                            <div class="row py-4 text-center">
                                <table class="table table-dark table-striped rounded-2">
                                    <thead>
                                        <tr class="table-title-row">
                                            <th colspan="7" class="text-start text-primary fs-4">Rezervimet</th>
                                            <th class="text-end">
                                                <button class="bg-success text-light py-1 px-3 border-0 rounded-2"
                                                    data-bs-toggle="modal" data-bs-target="#shtoRezervim">
                                                    <i class="bi bi-plus-lg"></i> Shto Rezervim
                                                </button>
                                            </th>
                                        </tr>
                                        <tr>
                                            <th class="text-primary">ID</th>
                                            <th class="text-primary">Automjeti ID</th>
                                            <th class="text-primary">Klienti ID</th>
                                            <th class="text-primary">Username</th>
                                            <th class="text-primary">Data e Marrjes</th>
                                            <th class="text-primary">Data e Kthimit</th>
                                            <th class="text-primary">Shenime</th>
                                            <th class="text-primary">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="rezervimiTabela">

                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <div id="pageToast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastText"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!--MOdali per rezervim-->
    <div class="modal fade" id="shtoRezervim" tabindex="-1" aria-labelledby="addReservationModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addReservationModalLabel">Shto Rezervim</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="rezervimiForm">
                        <div class="mb-3">
                            <label for="autoId" class="form-label">Automjeti Id</label>
                            <input type="text" class="form-control" id="autoId" required>
                        </div>
                        <div class="mb-3">
                            <label for="clientiId" class="form-label">Klienti ID</label>
                            <input type="number" class="form-control" id="clientiId" required>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username i klientit</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="dataMarrjes" class="form-label">Data e Marrjes</label>
                            <input type="date" class="form-control" id="dataMarrjes" required>
                        </div>
                        <div class="mb-3">
                            <label for="dataKthimit" class="form-label">Data e Kthimit</label>
                            <input type="date" class="form-control" id="dataKthimit" required>
                        </div>
                        <div class="mb-3">
                            <label for="shenime" class="form-label">Shenime</label>
                            <input type="text" class="form-control" id="shenime" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Mbyll</button>
                    <button type="submit" class="btn btn-success" form="rezervimiForm">Ruaj Rezervimin</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/dashboard/adminrezervimet.js"></script>
    <script src="../../scripts/dashboard/admin.js"></script>
</body>

</html>
