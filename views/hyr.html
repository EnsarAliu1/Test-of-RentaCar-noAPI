<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyr</title>
    <link rel="stylesheet" href="../styles/css/main.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
        integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">

<script src="../data/db.js"></script>
</head>

<body class="bg-secondary">
    <section class="form-section ">
        <div class="container py-5 text-center">
            <div class="row d-flex justify-content-center align-content-center">
                <div class="col-md-4 col-sm-12">
                    <form id="hyrForm" class="bg-light m-auto p-5 rounded-4">
                        <h2 class="fw-bold"><i class="bi bi-car-front-fill text-primary"></i> Rent a Car</h2>
                        <h2 class="fw-bold mt-3">Miresevini Perseri</h2>
                        <p class="text-pharagraph">Futni kredencialet tuaja per te hyre</p>
                        <div class="form-control bg-light border-0 text-start">
                            <label class="mb-1 fw-bold" for="email">Email</label>
                            <br>
                            <input class="py-2 border border-tertiary w-100 rounded-2" type="email" id="email"
                                name="email" placeholder="Shkruani emailin tuaj">
                        </div>
                        <div class="form-control bg-light border-0 text-start mt-3">
                            <label class="mb-1 fw-bold" for="password">Fjalëkalimi</label>
                            <br>
                            <input class="py-2 border border-tertiary w-100 rounded-2" type="password" id="password"
                                name="password" placeholder="Shkruani fjalëkalimin tuaj">
                        </div>
                        <button class="w-100 bg-primary py-2 border-0 rounded-2 mt-3">Hyr</button>
                        <p class="text-pharagraph mt-2">
                            Nuk keni llogari?
                            <a class="text-decoration-none text-primary" href="./regjistrohu.html">Regjistrohu
                            </a>
                        </p>
                        <a class="text-decoration-none text-pharagraph" href="../index.html"><i
                                class="bi bi-arrow-left-short"></i> Kthehuni
                            ne faqen kryesore</a>
                    </form>
                </div>
            </div>
        </div>
    </section>


    <div class="position-fixed top-0 end-0 p-3">
        <div id="loginToast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastText"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/hyr.js"></script>
</body>

</html>
